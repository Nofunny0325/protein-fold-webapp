<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protein Fold Workspace</title>
    <style>
      body {
        margin: 0;
        background: #f5f7f8;
        color: #182026;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .boot-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(320px, 420px) 1fr;
        gap: 16px;
        padding: 16px;
        box-sizing: border-box;
      }
      .boot-panel,
      .boot-viewer {
        background: #fff;
        border: 1px solid #d9e0e4;
        border-radius: 8px;
        padding: 16px;
      }
      .boot-viewer {
        display: grid;
        place-items: center;
        min-height: 560px;
        color: #65737c;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell">
        <section class="boot-panel">
          Loading protein folding workspace...
        </section>
        <section class="boot-viewer">
          Loading viewer
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
