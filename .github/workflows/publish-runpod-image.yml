name: Publish RunPod Serverless Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - runpod/**
      - .github/workflows/publish-runpod-image.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nofunny0325/protein-fold-runpod

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/Dockerfile.serverless
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
